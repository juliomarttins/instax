<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravi Control - 7 Dias</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; margin: 0; padding: 15px; text-align: center; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 20px 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-milk { background: #bb86fc; color: #000; }
        .btn-food { background: #03dac6; color: #000; }
        .btn-water { background: #3700b3; color: #fff; }
        .btn-sleep { background: #cf6679; color: #fff; }
        .btn-wake { background: #ffde03; color: #000; }
        .alert { color: #ff9800; font-weight: bold; margin-top: 5px; }
        .history { text-align: left; font-size: 12px; max-height: 150px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Dashboard do Ravi</h2>
        <div id="summary">Carregando dados...</div>
    </div>

    <div class="grid">
        <button class="btn-milk" onclick="log('mamou')">🍼 MAMOU</button>
        <button class="btn-food" onclick="log('comeu')">🍎 COMEU</button>
        <button class="btn-water" onclick="log('agua', 150)">💧 ÁGUA (150ml)</button>
        <button class="btn-sleep" onclick="log('dormiu')">😴 DORMIU</button>
        <button class="btn-wake" onclick="log('acordou')">☀️ ACORDOU</button>
        <button style="background:#555; color:#fff;" onclick="log('banho')">🛁 BANHO</button>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>Últimas 24h</h3>
        <div id="log-history" class="history"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, orderByKey, limitToLast, remove, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-RiPC6pwRT5ysC8TGQBN4G-SQUtXa_nE",
            authDomain: "instax-2211.firebaseapp.com",
            databaseURL: "https://instax-2211-default-rtdb.firebaseio.com",
            projectId: "instax-2211",
            storageBucket: "instax-2211.firebasestorage.app",
            messagingSenderId: "598132159365",
            appId: "1:598132159365:web:c2716b78752fd588134aec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const logRef = ref(db, 'ravi_logs');

        window.log = (type, val = null) => {
            push(logRef, { type, value: val, time: Date.now() });
        };

        function updateUI(data) {
            if (!data) return;
            const now = Date.now();
            const logs = Object.values(data).sort((a,b) => b.time - a.time);
            
            // Limpeza de 7 dias
            const sevenDaysAgo = now - (7 * 24 * 60 * 60 * 1000);
            Object.keys(data).forEach(key => {
                if (data[key].time < sevenDaysAgo) remove(ref(db, 'ravi_logs/' + key));
            });

            const lastWake = logs.find(l => l.type === 'acordou');
            const lastEat = logs.find(l => l.type === 'mamou' || l.type === 'comeu');
            const waterToday = logs.filter(l => l.type === 'agua' && new Date(l.time).toDateString() === new Date().toDateString())
                                   .reduce((acc, curr) => acc + (curr.value || 0), 0);

            let html = `<p>💧 Água Hoje: <b>${waterToday}ml / 1200ml</b></p>`;

            if (lastWake) {
                const diffMin = Math.floor((now - lastWake.time) / 60000);
                html += `<p>☀️ Acordado há: <b>${Math.floor(diffMin/60)}h ${diffMin%60}min</b></p>`;
                html += `<p class="alert">💤 Previsão Sono: <b>${new Date(lastWake.time + 3*60*60*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${new Date(lastWake.time + 4*60*60*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</b></p>`;
            }

            if (lastEat) {
                const eatDiff = Math.floor((now - lastEat.time) / 60000);
                html += `<p>🍎 Última Refeição: <b>há ${eatDiff} min</b></p>`;
                if (eatDiff > 180) html += `<p class="alert" style="color:red">⚠️ Ravi deve estar com fome! (>3h)</p>`;
            }

            document.getElementById('summary').innerHTML = html;

            const histHtml = logs.slice(0, 20).map(l => `<div>[${new Date(l.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}] ${l.type.toUpperCase()} ${l.value ? l.value+'ml' : ''}</div>`).join('');
            document.getElementById('log-history').innerHTML = histHtml;
        }

        onValue(logRef, (snap) => updateUI(snap.val()));
    </script>
</body>
</html>
