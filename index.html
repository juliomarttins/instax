<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Viewer Zero Reais</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input { width: 70%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background-color: #6200ea; color: white; font-weight: bold; }
        button:hover { background-color: #3700b3; }
        #player-container { margin: 20px 0; min-height: 400px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 480px; border: none; border-radius: 10px; }
        .hidden { display: none; }
        .action-btn { background-color: #03dac6; color: black; font-size: 18px; width: 100%; padding: 15px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Adicionar Vídeo</h2>
        <input type="text" id="ig-link" placeholder="Cole o link do Instagram aqui">
        <button onclick="adicionarVideo()">Enviar</button>

        <div id="player-container">
            <p id="status-msg">Carregando ou nenhum vídeo novo...</p>
        </div>

        <button id="btn-visto" class="action-btn hidden" onclick="marcarComoVisto()">Visto 👍 Próximo</button>
    </div>

    <!-- Scripts do Firebase (Módulos) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, query, orderByChild, equalTo, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // VOCÊ PRECISA SUBSTITUIR ISSO PELAS SUAS CREDENCIAIS DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA-RiPC6pwRT5ysC8TGQBN4G-SQUtXa_nE",
            authDomain: "instax-2211.firebaseapp.com",
            databaseURL: "https://instax-2211-default-rtdb.firebaseio.com", 
            projectId: "instax-2211",
            storageBucket: "instax-2211.firebasestorage.app",
            messagingSenderId: "598132159365",
            appId: "1:598132159365:web:c2716b78752fd588134aec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let videoAtualId = null;

        window.adicionarVideo = function() {
            const link = document.getElementById('ig-link').value;
            if (!link) return;
            
            const match = link.match(/(?:p|reel|reels)\/([A-Za-z0-9_-]+)/);
            if (match && match[1]) {
                push(ref(db, 'videos'), {
                    ig_id: match[1],
                    status: 'pendente',
                    timestamp: Date.now()
                }).then(() => {
                    document.getElementById('ig-link').value = '';
                });
            } else {
                alert("O link inserido não é um formato reconhecido pelo meu processador.");
            }
        };

        const carregarProximo = () => {
            const videosRef = query(ref(db, 'videos'), orderByChild('status'), equalTo('pendente'));
            onValue(videosRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const chaves = Object.keys(data);
                    // Pega o mais antigo da fila
                    chaves.sort((a, b) => data[a].timestamp - data[b].timestamp);
                    videoAtualId = chaves[0];
                    const igId = data[videoAtualId].ig_id;
                    
                    document.getElementById('player-container').innerHTML = `<iframe src="https://www.instagram.com/p/${igId}/embed/captioned" scrolling="no"></iframe>`;
                    document.getElementById('btn-visto').classList.remove('hidden');
                } else {
                    document.getElementById('player-container').innerHTML = '<p>Fila vazia. Vão trabalhar.</p>';
                    document.getElementById('btn-visto').classList.add('hidden');
                    videoAtualId = null;
                }
            }, { onlyOnce: true });
        };

        window.marcarComoVisto = function() {
            if (videoAtualId) {
                update(ref(db, `videos/${videoAtualId}`), {
                    status: 'visto'
                }).then(() => {
                    document.getElementById('player-container').innerHTML = '<p>Carregando próximo...</p>';
                    carregarProximo();
                });
            }
        };

        // Inicia a busca inicial
        carregarProximo();
    </script>
</body>
</html>
